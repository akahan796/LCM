<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lifecycle Management (LCM) — Activity Log</title>
<link rel="icon" href="logo.png" />
<style>
  @font-face{font-family:'OneStream Sans';src:url('fonts/OneStreamSans-Regular.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap;}
  @font-face{font-family:'OneStream Sans';src:url('fonts/OneStreamSans-Medium.otf') format('opentype');font-weight:500;font-style:normal;font-display:swap;}
  @font-face{font-family:'OneStream Sans';src:url('fonts/OneStreamSans-Bold.otf') format('opentype');font-weight:700;font-style:normal;font-display:swap;}
  :root{
    --brand:#0A5DFF; --brand-hover:#0847c9;
    --text:#141414; --text-2:#373737; --text-3:#6E6E6E; --icon:#373737; --placeholder:#989898;
    --bg:#FAFAFA; --surface:#FFFFFF; --sidebar:#171717;
    --nav-fg:#C8C8C8; --nav-sel-bg:#2E2E2E; --nav-sel-fg:#FFFFFF; --nav-sel-icon:#CEDFFF; --nav-cat:#8F8F8F;
    --border:#E6E6E6; --line:#BDBDBD; --divider:#EFEFEF;
    --err-bg:#F9E8EB; --err-fg:#890C1D;
    --ok-bg:#E6F5EE; --ok-fg:#005B34;
    --warn-bg:#FFF2E6; --warn-fg:#934B01;
    --neutral-bg:#EEEEEE; --neutral-fg:#373737;
    --sidebar-w:240px; --header-h:72px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'OneStream Sans', Arial, Helvetica, sans-serif; color:var(--text); background:var(--bg); -webkit-font-smoothing:antialiased;}
  button{font-family:inherit; cursor:pointer;}
  .ic{display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .ic svg{width:14px;height:14px;display:block;}
  .ic.i16 svg{width:16px;height:16px;}
  .ic.i20 svg{width:16px;height:16px;}
  .ic.i22 svg{width:22px;height:22px;}
  .app{display:flex; min-height:100vh;}

  /* Sidebar — ODS Side Navigation (Customer Branded, dark) */
  .sidebar{width:var(--sidebar-w); flex:0 0 var(--sidebar-w); background:var(--sidebar); color:#fff; display:flex; flex-direction:column; position:sticky; top:0; height:100vh;}
  .side-head{display:flex; justify-content:flex-end; padding:24px 20px 0;}
  .side-head .ic{color:#fff;}
  .brand{display:flex; flex-direction:column; align-items:center; gap:10px; padding:16px 0 24px;}
  .brand .logo{width:82px; height:82px; border-radius:50%; overflow:hidden;}
  .brand .logo img{width:100%; height:100%; display:block; object-fit:cover;}
  .brand .name{font-weight:700; font-size:14px;}
  .nav{flex:1; padding:0 12px;}
  .nav a{display:flex; align-items:center; gap:12px; padding:0 12px; height:40px; border-radius:6px; color:var(--nav-fg); text-decoration:none; font-size:14px; font-weight:500;}
  .nav a .ic{color:var(--nav-fg);}
  .nav a .chev{margin-left:auto; color:var(--nav-fg); display:inline-flex;}
  .nav a:hover{background:rgba(255,255,255,.06);}
  .nav a.active{background:var(--nav-sel-bg); color:var(--nav-sel-fg); font-weight:700;}
  .nav a.active .ic{color:var(--nav-sel-icon);}
  .nav .cat{font-size:10px; font-weight:500; letter-spacing:.2px; color:var(--nav-cat); text-transform:uppercase; padding:16px 12px 8px;}
  .sidebar .foot{display:flex; align-items:center; gap:10px; padding:16px 20px; color:#fff; font-size:12px;}
  .sidebar .foot .os{display:inline-flex; align-items:center; gap:6px; font-weight:500;}
  .sidebar .foot .ver{color:#fff; margin-left:auto; font-size:12px;}

  /* Main */
  .main{flex:1; min-width:0; display:flex; flex-direction:column;}
  .topbar{height:var(--header-h); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; padding:0 20px;}
  .topbar .title{font-weight:700; font-size:18px; white-space:nowrap;}
  .search{display:flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--line); border-radius:4px; height:32px; padding:0 10px; color:var(--placeholder); flex:1; max-width:640px; margin:0 auto;}
  .search .ic{color:var(--icon);}
  .search input{border:0; background:transparent; outline:none; font-size:16px; color:var(--text); width:100%; font-family:inherit;}
  .search input::placeholder{color:var(--placeholder);}
  .btn{display:inline-flex; align-items:center; gap:8px; height:32px; padding:0 12px; border-radius:4px; border:1px solid var(--line); background:#fff; color:var(--text); font-size:14px; font-weight:700; white-space:nowrap;}
  .btn .ic{color:var(--icon);}
  .btn:hover{background:#f7f7f7;}
  .btn.primary{background:var(--brand); border-color:var(--brand); color:#fff;}
  .btn.primary .ic{color:#fff;}
  .btn.primary:hover{background:var(--brand-hover);}
  .btn.sm{height:28px; padding:0 12px; font-size:12px; gap:8px;}
  .iconbtn{width:28px; height:28px; border-radius:4px; border:1px solid var(--line); background:#fff; display:inline-flex; align-items:center; justify-content:center; color:var(--icon);}
  .iconbtn.dark{background:var(--sidebar); border-color:var(--sidebar); color:#fff;}
  .avatar{width:38px;height:38px;border-radius:50%;background:#F0F0F0;border:1px solid #CFCFCF;display:flex;align-items:center;justify-content:center;color:#5a5a5a; flex:0 0 auto;}

  /* Content View (ODS page shell) */
  .content-view{flex:1; padding:24px 32px 16px 32px;}
  .cv-heading{font-size:18px; font-weight:700; color:#141414; margin:0;}
  .cv-body{font-size:14px; font-weight:400; color:#141414; margin:4px 0 0;}
  .content-actions{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:16px; flex-wrap:wrap;}
  .ca-left, .ca-right{display:flex; align-items:center; gap:12px;}
  .field{display:flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--line); border-radius:4px; height:28px; padding:0 10px; color:var(--placeholder); width:330px; max-width:100%;}
  .field .ic{color:var(--icon);}
  .field input{border:0;background:transparent;outline:none;font-size:14px;color:var(--text);width:100%; font-family:inherit;}
  .field input::placeholder{color:var(--placeholder);}

  /* Table */
  .table-wrap{border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#fff; margin-top:16px;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  thead th{background:#F7F7F7; text-align:left; font-weight:700; color:#333; padding:0 10px; height:46px; border-bottom:1px solid var(--border); white-space:nowrap; user-select:none;}
  thead th.sortable{cursor:pointer;}
  thead th .th{display:flex; align-items:center; gap:6px;}
  thead th .th .ic{color:#9a9a9a;}
  thead th.active{color:var(--brand);}
  thead th.active .th .ic{color:var(--brand);}
  thead th .dir{display:inline-flex;}
  tbody td{padding:0 10px; height:40px; border-bottom:1px solid var(--divider); white-space:nowrap; color:var(--text-2); vertical-align:middle;}
  tbody tr:last-child td{border-bottom:0;}
  tbody tr:hover{background:#FAFBFF;}
  td.id a{color:var(--brand); font-weight:700; text-decoration:none;}
  td.id a:hover{text-decoration:underline;}
  td.tmpl{max-width:340px; overflow:hidden; text-overflow:ellipsis;}
  .col-chk{width:44px; text-align:center;}
  input[type=checkbox]{width:16px;height:16px; accent-color:var(--brand); cursor:pointer;}
  .badges{display:flex; align-items:center; gap:6px;}
  .badge{display:inline-flex; align-items:center; gap:4px; height:20px; padding:0 8px; border-radius:10px; font-size:11px; font-weight:700; white-space:nowrap;}
  .badge.error{background:var(--err-bg); color:var(--err-fg);}
  .badge.success{background:var(--ok-bg); color:var(--ok-fg);}
  .badge.warning{background:var(--warn-bg); color:var(--warn-fg);}
  .badge.neutral{background:var(--neutral-bg); color:var(--neutral-fg);}
  .badge.outline{background:#fff; color:#6A6A6A; border:1px solid var(--line);}
  .row-actions{display:flex; align-items:center; justify-content:flex-end; gap:8px; padding-right:14px;}
  .empty{padding:40px; text-align:center; color:var(--placeholder);}

  /* Filter modal (ODS Standard Card + Dropdowns) */
  .modal-backdrop{position:fixed; inset:0; background:transparent; display:none; z-index:100;}
  .modal-backdrop.open{display:block;}
  .filter-card{position:fixed; background:#fff; border:1px solid var(--border); border-radius:8px; box-shadow:0 12px 32px rgba(0,0,0,.18); width:560px; max-width:calc(100vw - 32px); padding:16px 20px 20px;}
  .fc-head{display:flex; align-items:center; justify-content:space-between;}
  .fc-head .title{font-size:14px; font-weight:700; color:#141414;}
  .fc-head .clear{font-size:13px; font-weight:700; color:var(--brand); background:none; border:0; cursor:pointer; padding:0;}
  #conditions{margin-top:14px;}
  /* When more than 3 conditions exist, cap the height and scroll the parameters area. */
  #conditions.scroll{max-height:180px; overflow-y:auto; overflow-x:hidden; padding-right:6px;}
  .cond{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
  .connector{margin-bottom:8px;}
  .remove-btn{background:none; border:0; cursor:pointer; color:#D0021B; display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; padding:0; margin-left:2px;}
  .add-cond{margin-top:4px;}
  .fc-footer{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:18px;}
  .fc-footer-left{display:flex; align-items:center; gap:12px;}
  .fc-footer .add-cond{margin-top:0;}
  .fc-link{font-size:13px; font-weight:700; color:var(--brand); background:none; border:0; cursor:pointer; padding:0;}
  .fc-link:hover{text-decoration:underline;}
  .apply-btn:disabled{background:#E6E6E6; border-color:#E6E6E6; color:#ABABAB; cursor:default;}
  .apply-btn:disabled:hover{background:#E6E6E6;}
  .dd{position:relative;}
  .dd-control{display:flex; align-items:center; justify-content:space-between; gap:8px; height:28px; padding:0 10px; background:#fff; border:1px solid var(--line); border-radius:4px; cursor:pointer; font-size:14px; color:var(--text); user-select:none;}
  .dd-control > span:first-child{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .dd-control.placeholder{color:var(--placeholder);}
  .dd-control .ic{color:var(--icon);}
  .dd-control{width:100%;}
  .cond .dd-field, .cond .dd-value{flex:1 1 0; min-width:0;} .cond .dd-op{flex:0 0 116px;} .dd-conn{width:72px;}
  .filter-count{display:inline-flex; align-items:center; justify-content:center; min-width:16px; height:16px; padding:0 5px; border-radius:8px; background:var(--brand); color:#fff; font-size:11px; font-weight:700;}
  .filter-chev{transition:transform .15s ease;}
  #filter-btn.open{border-color:var(--brand); color:var(--brand); position:relative; z-index:101;}
  #filter-btn.open > .ic{color:var(--brand);}
  #filter-btn.open .filter-chev{transform:rotate(180deg);}
  .dd-menu{position:absolute; top:calc(100% + 4px); left:0; min-width:100%; background:#fff; border:1px solid var(--border); border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.14); padding:4px 0; z-index:10; display:none;}
  .dd.open .dd-menu{display:block;}
  .dd-menu .dd-head{font-size:10px; font-weight:500; letter-spacing:.2px; color:var(--placeholder); text-transform:uppercase; padding:8px 12px 4px;}
  .dd-item{display:flex; align-items:center; justify-content:space-between; gap:8px; height:34px; padding:0 12px; font-size:14px; color:#141414; cursor:pointer;}
  .dd-item:hover{background:#F4F7FF;}
  .dd-item.selected{color:var(--brand);}
  .dd-item .ic{color:var(--brand);}
  .dd-item-multi{justify-content:flex-start; gap:10px;}
  .dd-check{width:16px; height:16px; accent-color:var(--brand); pointer-events:none; flex:0 0 auto; margin:0;}
  .dd-control.disabled{background:#F2F2F2; cursor:default; color:#6E6E6E;}
  .dd-control.disabled:hover{background:#F2F2F2;}
  .dd-control.disabled .ic{color:#C8C8C8;}
  /* Templates view */
  .view[hidden]{display:none;}
  .cv-eyebrow{font-size:14px; color:#6E6E6E; margin:0 0 8px;}
  .tiles-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; margin-top:24px;}
  .tile{background:#fff; border:1px solid #E0E0E0; border-radius:8px; padding:24px 16px; box-shadow:0 1px 2px rgba(16,24,40,.04);}
  .tile-top{display:flex; align-items:center; justify-content:space-between; height:16px;}
  .tile-status{display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:500; color:var(--brand);}
  .tile-status .ic{width:12px; height:12px;}
  .tile-ver{font-size:12px; color:#6E6E6E; margin-left:auto;}
  .tile-title{display:flex; align-items:center; gap:4px; margin-top:12px; color:#141414;}
  .tile-title .ic{width:16px; height:16px; flex:0 0 16px; color:#141414;}
  .tile-title .tt{font-size:14px; font-weight:700; line-height:20px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .tile-object{margin-top:6px; font-size:14px; line-height:16px; color:#6E6E6E;}
  .tile-st{display:flex; align-items:center; margin-top:18px;}
  .st-panel{flex:1 1 0; min-width:0; border-radius:4px; padding:6px 8px;}
  .st-panel.st-source{background:#EEEEEE;}
  .st-panel.st-target{background:#EEF0FF;}
  .st-chevron{flex:0 0 26px; display:flex; align-items:center; justify-content:center; color:#6E6E6E;}
  .st-chevron .ic{width:10px; height:10px;}
  .st-row + .st-row{margin-top:4px;}
  .st-label{font-size:12px; font-weight:400; color:#6E6E6E; line-height:16px;}
  .st-value{font-size:12px; font-weight:700; color:#141414; line-height:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  @media (max-width:1100px){ .sidebar{display:none;} .search{max-width:none;} }
</style>
</head>

function matchConditions(applied, d){
  const act = applied.filter(c=>c.field && c.value && c.value.length);
  if(!act.length) return true;
  let res=null;
  act.forEach(c=>{
    const v = String(d[c.field]).toLowerCase();
    const vals = c.value.map(x=>String(x).toLowerCase());
    let m;
    if(c.op==='Contains') m = vals.some(x=>v.includes(x));            // any selected value contained
    else if(c.op==='Does not contain') m = vals.every(x=>!v.includes(x)); // none contained
    else m = vals.some(x=>v===x);                                     // Equals: any-of
    res = res===null? m : (c.connector==='or'? (res||m) : (res&&m));
  });
  return res;
}

            <div class="cond">
              <${Dropdown} cls="dd-field" disabled=${!!c.field} value=${fieldLabel(c.field)} placeholder="Select Field Name" head="FIELD NAME" options=${FIELDS.map(f=>f.label)} isOpen=${openDD==='field-'+i} onToggle=${()=>toggleDD('field-'+i)} onPick=${v=>setField(i,v)}/>
              <${Dropdown} cls="dd-op" value=${c.op} placeholder="Contains" head="OPERATORS" options=${OPERATORS} isOpen=${openDD==='op-'+i} onToggle=${()=>toggleDD('op-'+i)} onPick=${v=>patch(i,{op:v})}/>
              <${Dropdown} cls="dd-value" multi=${true} value=${c.value} placeholder="Select Value" head="VALUE" options=${distinctValues(c.field)} isOpen=${openDD==='value-'+i} onToggle=${()=>toggleDD('value-'+i)} onPick=${v=>toggleValue(i,v)}/>
              ${conditions.length>1? html`<button class="remove-btn" onClick=${()=>removeCond(i)}><${Icon} name="remove"/></button>` : null}
            </div>
          <//>`)}
        </div>
        <div class="fc-footer">
          <div class="fc-footer-left">
            <button class="btn sm add-cond" onClick=${addCond}><${Icon} name="plus"/>Add Condition</button>
            <button class="fc-link" onClick=${clearAll}>Clear All</button>
          </div>
        </div>
      </div>
    </div>`;

  return html`<section class="view" hidden=${!active}>
    <h1 class="cv-heading">Activity Log</h1>
    <p class="cv-body">View all closed migrations, individual activity, and member-level details. Sort and reorder columns, search, filter, and export content.</p>
    <div class="content-actions">
      <div class="ca-left">
        <div class="field"><${Icon} name="search"/><input placeholder="Search activity" value=${search} onChange=${e=>setSearch(e.target.value)}/></div>
        <button class=${'btn sm'+(filterOpen?' open':'')} id="filter-btn" ref=${btnRef}
          onClick=${toggleFilter}
          onMouseEnter=${()=>{ pointerOver.current=true; cancelClose(); }}
          onMouseLeave=${()=>{ pointerOver.current=false; armClose(); }}>
          <${Icon} name="filter"/>Filter${activeCount>0? html`<span class="filter-count">${activeCount}</span>` : null}<${Icon} name="chevron" cls="filter-chev"/>
        </button>
      </div>
      <div class="ca-right">
        <button class="btn sm primary"><${Icon} name="export"/>Export Member Details</button>
        <button class="iconbtn dark"><${Icon} name="grid"/></button>
        <button class="iconbtn"><${Icon} name="list"/></button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th class="col-chk"><input type="checkbox" checked=${allChecked} onChange=${toggleAll}/></th>
          ${FIELDS.map(col=>html`<th key=${col.key} class=${'sortable'+(sortKey===col.key?' active':'')} onClick=${()=>sortBy(col.key)}>
            <span class="th">${col.label} <span class="dir" dangerouslySetInnerHTML=${{__html: sortKey===col.key? (sortDir===1?ARROW_UP:ARROW_DOWN) : ''}}></span><${Icon} name="filter"/></span>
          </th>`)}
          <th></th>
        </tr></thead>
        <tbody>
          ${rows.length? rows.map(d=>html`<tr key=${d.id}>
            <td class="col-chk"><input type="checkbox" class="row-chk" checked=${checked.has(d.id)} onChange=${()=>toggleRow(d.id)}/></td>
            <td class="id"><a href="#" onClick=${e=>e.preventDefault()}>${d.id}</a></td>
            <td>${d.type}</td>
            <td class="tmpl" title=${d.template}>${d.template}</td>
            <td>${d.object}</td>
            <td>${d.user}</td>
            <td>${d.start}</td>
            <td><${Badges} status=${d.status}/></td>
            <td><div class="row-actions">
              <button class="btn sm"><${Icon} svg=${ACT}/>Activity</button>
              <button class="btn sm"><${Icon} svg=${MEM}/>Members</button>
            </div></td>
          </tr>`) : html`<tr><td colSpan="9" class="empty">No matching activity.</td></tr>`}
        </tbody>
      </table>
    </div>
    ${filterOpen? createPortal(panel, document.body) : null}
  </section>`;
}
function App(){
  const [view,setView] = useState('activity');
  // Frame hook: let an embedding shell (the designer sidebar) drive navigation
  // and stay in sync. Not part of the UX — just accepts/emits view messages.
  useEffect(()=>{
    function onMsg(e){ if(e.data && e.data.type==='lcm:setView' && (e.data.view==='activity'||e.data.view==='templates')) setView(e.data.view); }
    window.addEventListener('message', onMsg);
    return ()=>window.removeEventListener('message', onMsg);
  },[]);
  useEffect(()=>{ try{ if(window.parent!==window) window.parent.postMessage({type:'lcm:view', view}, '*'); }catch(_){}
  },[view]);
  return html`<div class="app">
    <${Sidebar} view=${view} setView=${setView}/>
    <div class="main">
      <${TopBar}/>
      <main class="content-view">
        <${ActivityView} active=${view==='activity'}/>
        <${TemplatesView} active=${view==='templates'}/>
      </main>
    </div>
  </div>`;
}
createRoot(document.getElementById('root')).render(html`<${App}/>`);
console.log('%cLCM prototype (app.html) — build 2026-07-22-react-6 (no Intent; filter note moved to frame comment)','color:#0A5DFF;font-weight:bold');
</script>
</body>
