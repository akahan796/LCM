<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lifecycle Management — Sign in</title>
<link rel="icon" href="logo.png" />
<style>
  @font-face{font-family:'OneStream Sans';src:url('fonts/OneStreamSans-Regular.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap;}
  @font-face{font-family:'OneStream Sans';src:url('fonts/OneStreamSans-Bold.otf') format('opentype');font-weight:700;font-style:normal;font-display:swap;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:'OneStream Sans',Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center;padding:20px;
    background:radial-gradient(1200px 600px at 50% -10%,#eef2fb 0%,#f4f5f8 55%,#eef0f4 100%);}
  .card{width:360px;max-width:100%;background:#fff;border:1px solid #E6E6E6;border-radius:12px;box-shadow:0 18px 50px rgba(20,30,60,.14);padding:32px 28px 28px;text-align:center;}
  .badge{width:60px;height:60px;border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;background:#0A5DFF;overflow:hidden;}
  .badge img{width:100%;height:100%;object-fit:cover;display:block;}
  h1{font-size:20px;font-weight:700;color:#141414;margin:0 0 6px;}
  p{font-size:14px;color:#6E6E6E;margin:0 0 20px;line-height:19px;}
  .err{color:#890C1D;background:#F9E8EB;border-radius:6px;font-size:13px;padding:8px 10px;margin:0 0 12px;text-align:left;}
  input{width:100%;height:40px;border:1px solid #BDBDBD;border-radius:4px;padding:0 12px;font-size:14px;font-family:inherit;color:#141414;outline:none;margin-bottom:12px;}
  input:focus{border-color:#0A5DFF;box-shadow:0 0 0 3px rgba(10,93,255,.14);}
  button{width:100%;height:40px;border:0;border-radius:4px;background:#0A5DFF;color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}
  button:hover{background:#0847c9;}
</style>
</head>
<body>
  <form class="card" method="POST" action="/api/login" autocomplete="off">
    <div class="badge"><img src="logo.png" alt="" onerror="this.style.display='none'"></div>
    <h1>Lifecycle Management</h1>
    <p>This prototype is password-protected. Enter the access password to continue.</p>
    <div class="err" id="err" style="display:none">Incorrect password. Please try again.</div>
    <input id="pw" type="password" name="password" placeholder="Enter password" autocomplete="current-password" aria-label="Password" autofocus required />
    <button type="submit">Unlock</button>
  </form>
<script>
  if (new URLSearchParams(location.search).get('e')) document.getElementById('err').style.display='block';
  document.getElementById('pw').focus();
</script>
</body>
</html>
